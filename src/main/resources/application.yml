spring:
  application:
    name: libri-api
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?stringtype=unspecified
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

server:
  port: 8080

libri:
  storage:
    images-dir: ${IMAGES_DIR}
  crawler:
    binary-path: ${CRAWLER_BINARY_PATH}
  internal:
    api-key: ${INTERNAL_API_KEY}
