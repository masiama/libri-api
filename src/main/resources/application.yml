spring:
  application:
    name: libri-api
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?stringtype=unspecified&prepareThreshold=0
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${CLERK_JWKS_URL}
  data:
    redis:
      url: ${REDIS_URL}

server:
  port: 8080

libri:
  storage:
    images-dir: ${IMAGES_DIR}
